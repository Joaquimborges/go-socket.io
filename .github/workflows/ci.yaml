name: CI
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: ubuntu Go 1.26
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Check go version
        run: go version

      - name: Go Format
        run: test -z "$(gofmt -s -l .)"

      - name: Go Tidy
        run: go mod tidy && git diff --exit-code

      - name: Go Mod Verify
        run: go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

      - name: Run tests
        run: make test
